[pytest]

# AnyIO runner is used (@pytest.mark.anyio)
# Limit default test discovery to the tests/ package
testpaths = tests
addopts = -q

markers =
    anyio: mark test as using anyio for async I/O
    asyncio: mark test as using asyncio for async I/O
    exit_sprint1: Sprint 1 exit gate tests (must all pass before Sprint 2)
    exit_sprint2: Sprint 2 exit gate tests (must all pass before Sprint 3)
    exit_sprint3: Sprint 3 exit gate tests (must all pass before Sprint 4)
    exit_multitenant_v1: Multitenant foundation v1 (tenant resolution & isolation)
    exit_storefront_v1: Storefront public API v1
    exit_pricing_engine_v1: Pricing engine v1
    exit_pricing_audit_v1: Pricing audit v1
    exit_pricing_rules_admin_v1: Pricing rules admin v1
    exit_marketplace_v1: Marketplace v1
    exit_marketplace_bridge_v1: Marketplace to storefront bridge v1
    exit_b2b_booking_create_v1: B2B booking create v1
    exit_supplier_fulfilment_v1: B2B supplier fulfilment v1 gate
    exit_supplier_adapter_registry: Supplier adapter registry v1 gate
    exit_supplier_confirm_flow: Supplier confirm flow v1 gate
    exit_supplier_unresolved: Supplier unresolved error handling v1 gate
    exit_supplier_not_supported: Supplier not-supported flow v1 gate
    exit_supplier_error_propagation: Supplier error propagation v1 gate
    exit_canonical_schema_enforced: Canonical offers schema enforcement v1 gate
    exit_supplier_response_no_leak: Canonical offers no supplier raw leakage v1 gate
    exit_search_cache_ttl: Canonical offers search session TTL/indexes v1 gate
    exit_offer_token_booking_draft: Booking draft creation from canonical offer v1 gate
    exit_confirm_timeout_enforced: Supplier confirm timeout enforcement v1 gate
    exit_confirm_snapshot_redacted: Supplier confirm snapshot redaction v1 gate
    exit_b2b_pricing_overlay_applied: B2B pricing overlay applied on canonical offers v1 gate
    exit_b2b_pricing_no_rule: B2B pricing overlay default behaviour when no rules v1 gate
    exit_booking_repricing_consistency: Booking repricing consistency with canonical offers v1 gate
    exit_pricing_overlay_audit_written: Pricing overlay audit logging on search v1 gate
    exit_booking_repriced_audit_written: Booking repriced audit logging v1 gate
    exit_pricing_mismatch_audit_written: Pricing mismatch audit logging v1 gate
    exit_admin_supplier_health_endpoint_rbac_and_shape: Admin supplier health endpoint RBAC and response shape gate
    exit_admin_supplier_health_filtering_deterministic_order: Admin supplier health deterministic filtering/order gate
    exit_booking_uses_graph_pricing: Booking graph pricing usage gate
    exit_confirm_blocked_when_risk_review_or_rejected: Confirm flow blocked on risk review/rejected gate
    exit_graph_currency_mismatch_skips_rule: Pricing graph currency mismatch skip gate
    exit_graph_deterministic: Pricing graph deterministic output gate
    exit_marketplace_supplier_mapping_v1: Marketplace supplier mapping v1 gate
    exit_ops_incident_created_for_risk_review: Ops incident creation for risk review gate
    exit_ops_incident_created_for_supplier_all_failed: Ops incident creation for supplier-all-failed gate
    exit_ops_incident_deduplication: Ops incident deduplication gate
    exit_ops_incident_list_filtering: Ops incident list filtering gate
    exit_ops_incident_rbac_denied: Ops incident RBAC denied gate
    exit_ops_incident_resolve_flow: Ops incident resolve flow gate
    exit_ops_incidents_detail_enrichment_default_true: Ops incidents detail enrichment default=true gate
    exit_ops_incidents_enrichment_health_not_found_fail_open: Ops incidents enrichment health fail-open gate
    exit_ops_incidents_enrichment_rbac_denied: Ops incidents enrichment RBAC denied gate
    exit_ops_incidents_enrichment_supplier_code_resolution_deterministic: Ops incidents supplier code deterministic resolution gate
    exit_ops_incidents_list_enrichment_attaches_badge: Ops incidents list enrichment badge gate
    exit_ops_incidents_list_no_enrichment_by_default: Ops incidents list enrichment disabled-by-default gate
    exit_pricing_graph_multi_level_applied: Pricing graph multi-level application gate
    exit_pricing_graph_no_parent_fallback: Pricing graph no-parent fallback gate
    exit_pricing_trace_by_booking: Pricing trace by booking gate
    exit_pricing_trace_by_session_offer: Pricing trace by session offer gate
    exit_pricing_trace_offer_token_not_found: Pricing trace offer token not found gate
    exit_pricing_trace_rbac_denied: Pricing trace RBAC denied gate
    exit_pricing_trace_view_audit_written: Pricing trace audit writing gate
    exit_risk_allow: Risk engine allow decision gate
    exit_risk_blocked: Risk engine blocked decision gate
    exit_risk_review: Risk engine review decision gate
    exit_risk_review_approve: Risk review approve flow gate
    exit_risk_review_reject: Risk review reject flow gate
    exit_risk_review_wrong_state: Risk review wrong-state guard gate
    exit_risk_score_deterministic: Risk score deterministic gate
    exit_supplier_all_failed_returns_503: Supplier all-failed returns 503 gate
    exit_supplier_circuit_closes_after_until: Supplier circuit closes after until gate
    exit_supplier_circuit_open_skips_supplier_and_emits_warning: Supplier circuit-open warning gate
    exit_supplier_circuit_opens_after_consecutive_failures: Supplier circuit opens after consecutive failures gate
    exit_supplier_health_snapshot_updates_on_calls: Supplier health snapshot update gate
    exit_supplier_partial_results_audit_written: Supplier partial results audit gate
    exit_supplier_partial_results_offers_empty_but_successful_supplier: Supplier partial results empty offers gate
    exit_supplier_partial_results_returns_200_with_warnings: Supplier partial results warning response gate
    exit_supplier_warnings_ordering_deterministic: Supplier warnings ordering deterministic gate
