# Syroce CI/CD Pipeline
# Enterprise Travel SaaS Platform
name: Syroce CI/CD

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  MONGO_URL: mongodb://localhost:27017
  DB_NAME: syroce_test
  JWT_SECRET: ci-test-secret-do-not-use-in-production
  STRIPE_WEBHOOK_SECRET: whsec_test
  STRIPE_API_KEY: sk_test_ci_dummy_key
  ENV: test

jobs:
  # ============================================
  # Stage 1: Lint & Static Analysis
  # ============================================
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install ruff mypy
          grep -v emergentintegrations backend/requirements.txt > /tmp/requirements_ci.txt
          pip install -r /tmp/requirements_ci.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/

      - name: Ruff lint (backend)
        run: ruff check backend/app/ --select E,F,W --ignore E501,E402

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        run: cd frontend && yarn install --frozen-lockfile

      - name: ESLint (frontend)
        run: cd frontend && npx eslint src/ --max-warnings 0

      - name: Check JSX for Turkish unicode escapes
        run: bash scripts/check_jsx_unicode_escapes.sh

  # ============================================
  # Stage 2: Architecture & Scope Guards
  # ============================================
  architecture-guard:
    name: Architecture & Scope Guards
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          grep -v emergentintegrations requirements.txt > /tmp/requirements_ci.txt
          pip install -r /tmp/requirements_ci.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
          pip install pytest pytest-anyio httpx pytest-rerunfailures

      - name: Architecture Guard (cross-domain imports)
        run: |
          cd backend
          python -m pytest tests/test_architecture_guard.py -v --timeout=30

      - name: Scope & Dependency Audit
        run: |
          cd backend
          python -m pytest tests/test_scope_audit.py -v --timeout=30

  # ============================================
  # Stage 3: Security Scanning
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety pip-audit

      - name: Check Python dependencies for vulnerabilities
        run: |
          grep -v emergentintegrations backend/requirements.txt > /tmp/requirements_audit.txt
          pip-audit -r /tmp/requirements_audit.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ --ignore-vuln PYSEC-2023-XXX
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit npm dependencies
        run: cd frontend && yarn audit --level high
        continue-on-error: true

  # ============================================
  # Stage 4: Unit & Integration Tests (Backend)
  # ============================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [lint, architecture-guard]
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          grep -v emergentintegrations requirements.txt > /tmp/requirements_ci.txt
          pip install -r /tmp/requirements_ci.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
          pip install pytest pytest-anyio pytest-cov httpx pytest-rerunfailures

      - name: Run unit tests with coverage
        run: |
          cd backend
          python -m pytest tests/ \
            -x --timeout=60 \
            --reruns=2 --reruns-delay=3 --only-rerun="AutoReconnect" \
            --cov=app --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered \
            -k "not preview and not external" \
            --ignore=tests/integration \
            -q

      - name: Check coverage thresholds
        run: |
          cd backend
          python scripts/check_coverage_threshold.py

      - name: Run integration tests
        run: |
          cd backend
          python -m pytest tests/integration/ \
            -x --timeout=120 \
            -k "not preview and not external" \
            -q
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ============================================
  # Stage 5: Frontend Build
  # ============================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: cd frontend && yarn install --frozen-lockfile

      - name: Build
        run: cd frontend && yarn build
        env:
          REACT_APP_BACKEND_URL: https://app.syroce.com
          CI: true

  # ============================================
  # Stage 6: API Contract Tests
  # ============================================
  contract-tests:
    name: API Contract Tests
    runs-on: ubuntu-latest
    needs: [backend-tests]
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          grep -v emergentintegrations requirements.txt > /tmp/requirements_ci.txt
          pip install -r /tmp/requirements_ci.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
          pip install pytest pytest-anyio httpx schemathesis pytest-rerunfailures

      - name: Run contract tests
        run: |
          cd backend
          python -m pytest tests/ \
            -x --timeout=120 \
            -k "contract or exit or api_v1" \
            -q

  # ============================================
  # Stage 7: Architecture Docs Freshness
  # ============================================
  docs-freshness:
    name: Architecture Docs Freshness
    runs-on: ubuntu-latest
    needs: [architecture-guard]
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          grep -v emergentintegrations requirements.txt > /tmp/requirements_ci.txt
          pip install -r /tmp/requirements_ci.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/

      - name: Check generated docs are up to date
        run: |
          cd backend
          python scripts/generate_arch_docs.py --check

  # ============================================
  # Stage 8: Quality Gate Summary
  # ============================================
  quality-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [lint, architecture-guard, backend-tests, frontend-build, security, docs-freshness]
    if: always()
    steps:
      - name: Quality Gate Report
        run: |
          echo "## Quality Gate Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (Backend + Frontend) | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture Guard | ${{ needs.architecture-guard.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests + Coverage | ${{ needs.backend-tests.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs Freshness | ${{ needs.docs-freshness.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Fail Conditions" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint errors**: Any ruff E/F/W violation or ESLint error" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture violation**: Cross-domain imports detected" >> $GITHUB_STEP_SUMMARY
          echo "- **Scope audit**: Orphan routers, duplicate ownership" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage below threshold**: Overall < 20%, Critical modules < 30%" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend build failure**: TypeScript/React compilation errors" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical gates failed
        if: |
          needs.lint.result != 'success' ||
          needs.architecture-guard.result != 'success' ||
          needs.backend-tests.result != 'success' ||
          needs.frontend-build.result != 'success'
        run: |
          echo "❌ One or more critical quality gates failed."
          exit 1

  # ============================================
  # Stage 8: Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, security, architecture-guard]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploy to staging environment"

  # ============================================
  # Stage 9: Deploy to Production
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, contract-tests, security, architecture-guard]
    if: startsWith(github.ref, 'refs/heads/release/')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploy to production environment"
